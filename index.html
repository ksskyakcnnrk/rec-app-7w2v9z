<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Voice Recorder</title>
    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background-color: #f3f4f6;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 左上の録音ボタンエリア */
        .top-left-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        /* 30pxに近いサイズ(スマホタップを考慮して44px)の録音ボタン */
        .record-btn-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.1s, opacity 0.2s;
            cursor: pointer;
        }

        .record-btn-small:active:not(:disabled) {
            transform: scale(0.9);
        }

        .record-btn-small:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .record-btn {
            background-color: #ef4444;
        }

        .stop-btn {
            background-color: #374151;
        }

        .timer-display {
            font-size: 0.9rem;
            font-family: monospace;
            color: #4b5563;
        }

        /* 中央の再生ボタンエリア */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画面中央の大きな再生ボタン (角丸四角) */
        .play-btn-large {
            width: 90vw;
            height: 60vh;
            max-width: 800px;
            max-height: 600px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9rem;
            font-weight: bold;
            color: white;
            background-color: #3b82f6;
            border: none;
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .play-btn-large:active:not(:disabled) {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .play-btn-large:disabled {
            background-color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .status-msg {
            position: absolute;
            bottom: 5%;
            font-size: 1rem;
            color: #6b7280;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="top-left-controls">
        <button id="recordStopBtn" class="record-btn-small record-btn">
            <span id="btnLabel">録音</span>
        </button>
        <div id="timer" class="timer-display" style="display: none;">00:00</div>
    </div>

    <div class="app-container">
        <button id="playBtn" class="play-btn-large" disabled>
            再生
        </button>
    </div>

    <div id="status" class="status-msg">「録音」を押してマイクを許可してください</div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audio;
        let timerInterval;
        let seconds = 0;
        let isRecording = false;

        // =============== 💡 連打防止用の安全フラグ ===============
        let isProcessing = false;

        let mainStream = null;

        const recordStopBtn = document.getElementById('recordStopBtn');
        const btnLabel = document.getElementById('btnLabel');
        const timerDisplay = document.getElementById('timer');
        const playBtn = document.getElementById('playBtn');
        const statusMsg = document.getElementById('status');

        async function prepareMicrophone() {
            if (mainStream) return true;
            try {
                mainStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusMsg.innerText = "待機中";
                return true;
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "マイク許可が必要です。ブラウザ設定を確認してください。";
                return false;
            }
        }

        async function startRecording() {
            // 処理中の場合は何もしない（連打防止）
            if (isProcessing) return;
            isProcessing = true;
            recordStopBtn.disabled = true; // 処理中はボタンを無効化

            if (audio && !audio.paused) {
                audio.pause();
                audio.currentTime = 0;
            }

            const hasPermission = await prepareMicrophone();
            if (!hasPermission) {
                isProcessing = false;
                recordStopBtn.disabled = false;
                return;
            }

            try {
                // =============== 💡 ここで変数を初期化 ===============
                // JavaScriptの配列クリア処理にかかる時間は0.001秒未満です（ラグは全くありません）
                audioChunks = [];
                mediaRecorder = new MediaRecorder(mainStream);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                // =============== 💡 録音停止時の処理 ===============
                mediaRecorder.onstop = () => {
                    const mimeType = mediaRecorder.mimeType || (audioChunks[0] && audioChunks[0].type) || 'audio/mp4';
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audio = new Audio(audioUrl);

                    // 💡iPad/iOS特有のバグ対策：マイクが起動したままだと再生音が聞こえなくなるため
                    // 録音完了時にマイクの接続を完全に切り、OSのマイクアイコンを消す
                    if (mainStream) {
                        mainStream.getTracks().forEach(track => track.stop());
                        mainStream = null;
                    }

                    playBtn.disabled = false;
                    statusMsg.innerText = "録音完了";

                    isRecording = false;

                    // 録音データの生成という重要な処理が終わった後にフラグを解除（ここが連打によるバグの解決策です）
                    isProcessing = false;
                    recordStopBtn.disabled = false;

                    recordStopBtn.classList.replace('stop-btn', 'record-btn');
                    btnLabel.innerText = "録音";
                    timerDisplay.style.display = 'none';
                    timerDisplay.innerText = "00:00";
                };

                mediaRecorder.start();
                isRecording = true;

                recordStopBtn.classList.replace('record-btn', 'stop-btn');
                btnLabel.innerText = "停止";
                playBtn.disabled = true;

                seconds = 0;
                timerDisplay.style.display = 'block';
                timerDisplay.innerText = "00:00";
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    timerDisplay.innerText = `${m}:${s}`;
                }, 1000);

                statusMsg.innerText = "録音中...";

                // 開始処理が正常に終わったら連打防止を解除
                isProcessing = false;
                recordStopBtn.disabled = false;
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "エラーが発生しました。";
                isProcessing = false;
                recordStopBtn.disabled = false;
            }
        }

        function stopRecording() {
            // 処理中の場合は何もしない
            if (isProcessing) return;
            isProcessing = true;

            // データ保存が完了するまで録音ボタンを押せないようにする
            recordStopBtn.disabled = true;
            statusMsg.innerText = "保存中...";

            clearInterval(timerInterval);

            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                // stopメソッドを呼ぶと、非同期でmediaRecorder.onstopが実行されます
                mediaRecorder.stop();
            } else {
                isProcessing = false;
                recordStopBtn.disabled = false;
                recordStopBtn.classList.replace('stop-btn', 'record-btn');
                btnLabel.innerText = "録音";
                timerDisplay.style.display = 'none';
            }
        }

        recordStopBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        playBtn.addEventListener('click', () => {
            if (audio) {
                audio.play();
                statusMsg.innerText = "再生中...";
                playBtn.disabled = true;
                audio.onended = () => {
                    playBtn.disabled = false;
                    statusMsg.innerText = "待機中";
                };
            }
        });
    </script>
</body>

</html>
