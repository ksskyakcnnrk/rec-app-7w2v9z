<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Voice Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background-color: #f3f4f6;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
            padding: 2rem;
            gap: 2rem;
        }
        .action-button {
            width: 40%;
            height: 60%;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
        }
        .action-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .action-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .record-btn { background-color: #ef4444; color: white; }
        .stop-btn { background-color: #374151; color: white; }
        .play-btn { background-color: #3b82f6; color: white; }
        .timer-display {
            font-size: 1.5rem;
            margin-top: 1rem;
            font-family: monospace;
        }
        .status-msg {
            position: absolute;
            bottom: 5%;
            font-size: 1.2rem;
            color: #6b7280;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <button id="recordStopBtn" class="action-button record-btn">
            <span id="btnLabel">開始</span>
            <div id="timer" class="timer-display" style="display: none;">00:00</div>
        </button>

        <button id="playBtn" class="action-button play-btn" disabled>
            再生
        </button>
    </div>

    <div id="status" class="status-msg">「開始」を押してマイクを許可してください</div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audio;
        let timerInterval;
        let seconds = 0;
        let isRecording = false;
        let mainStream = null; // マイクストリームを保持する変数

        const recordStopBtn = document.getElementById('recordStopBtn');
        const btnLabel = document.getElementById('btnLabel');
        const timerDisplay = document.getElementById('timer');
        const playBtn = document.getElementById('playBtn');
        const statusMsg = document.getElementById('status');

        // マイクの準備（初回のみ許可を求める）
        async function prepareMicrophone() {
            if (mainStream) return true;
            try {
                mainStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusMsg.innerText = "準備完了";
                btnLabel.innerText = "録音";
                return true;
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "マイク許可が必要です。ブラウザ設定を確認してください。";
                return false;
            }
        }

        async function startRecording() {
            // 初回、またはストリームが途切れている場合に準備
            const hasPermission = await prepareMicrophone();
            if (!hasPermission) return;

            try {
                // 既存のストリームを使ってMediaRecorderを作成
                mediaRecorder = new MediaRecorder(mainStream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audio = new Audio(audioUrl);
                    playBtn.disabled = false;
                    statusMsg.innerText = "録音完了";
                };

                mediaRecorder.start();
                isRecording = true;
                
                recordStopBtn.classList.replace('record-btn', 'stop-btn');
                btnLabel.innerText = "停止";
                playBtn.disabled = true;
                
                seconds = 0;
                timerDisplay.style.display = 'block';
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    timerDisplay.innerText = `${m}:${s}`;
                }, 1000);
                
                statusMsg.innerText = "録音中...";
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "エラーが発生しました。";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                // ※ここでは stream.stop() は呼び出さない（マイクを掴んだままにするため）
            }
            isRecording = false;
            recordStopBtn.classList.replace('stop-btn', 'record-btn');
            btnLabel.innerText = "録音";
            clearInterval(timerInterval);
            timerDisplay.style.display = 'none';
        }

        recordStopBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        playBtn.addEventListener('click', () => {
            if (audio) {
                audio.play();
                statusMsg.innerText = "再生中...";
                playBtn.disabled = true;
                audio.onended = () => {
                    playBtn.disabled = false;
                    statusMsg.innerText = "待機中";
                };
            }
        });
    </script>
</body>
</html>
